<div class="layout-shell">
  <aside class="sidebar">
    <div class="brand">
      <img class="brand__logo" src="assets/img/logo-dark.png" alt="Tinguilin dark logo" />
      <div>
        <h1>Tinguilin Admin</h1>
        <p>Admin Portal</p>
      </div>
    </div>

    <nav class="menu">
      @for (item of menuItems; track item) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.route === '/app/dashboard' }">
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="profile-card">
      @if (userAvatarUrl) {
        <img class="avatar" [src]="userAvatarUrl" [alt]="userDisplayName" />
      } @else {
        <div class="avatar avatar-fallback">{{ userInitials }}</div>
      }
      <div class="profile-card__content">
        <strong>{{ userDisplayName }}</strong>
        <small>{{ userEmail }}</small>
      </div>
      <button type="button" (click)="logout()">Logout</button>
    </div>

    <div class="brand-footer">
      <img src="assets/img/logo-light.png" alt="Tinguilin light logo" />
    </div>
  </aside>

  <main class="content">
    <header class="topbar">
      <div>
        <h2>{{ pageTitle }}</h2>
        <p>{{ pageSubtitle }}</p>
      </div>

      <div class="actions">
        <label class="search">
          <input
            type="text"
            placeholder="Search data..."
            [value]="globalSearchQuery"
            (input)="onGlobalSearchInput(($any($event.target)).value)"
            (focus)="openSearchPanel()"
            (blur)="closeSearchPanel()" />

          @if (isSearchOpen) {
            <section class="search-results">
              @if (isSearching) {
                <p class="search-state">Searching...</p>
              }
              @if (!isSearching && !hasSearchResults) {
                <p class="search-state">No result found.</p>
              }
              @if (searchResults?.users?.length) {
                <div class="result-group">
                  <h5>Users</h5>
                  @for (row of searchResults?.users; track row) {
                    <button type="button" (mousedown)="navigateFromSearch(row.route)">
                      <span>{{ row.name }}</span>
                      <small>{{ row.email }}</small>
                    </button>
                  }
                </div>
              }
              @if (searchResults?.customers?.length) {
                <div class="result-group">
                  <h5>Customers</h5>
                  @for (row of searchResults?.customers; track row) {
                    <button type="button" (mousedown)="navigateFromSearch(row.route)">
                      <span>{{ row.name }}</span>
                      <small>{{ row.email }}</small>
                    </button>
                  }
                </div>
              }
              @if (searchResults?.payments?.length) {
                <div class="result-group">
                  <h5>Payments</h5>
                  @for (row of searchResults?.payments; track row) {
                    <button type="button" (mousedown)="navigateFromSearch(row.route)">
                      <span>{{ row.customerName }}</span>
                      <small>{{ row.amount | number:'1.0-0' }} FCFA - {{ row.status }}</small>
                    </button>
                  }
                </div>
              }
              @if (searchResults?.raffles?.length) {
                <div class="result-group">
                  <h5>Raffles</h5>
                  @for (row of searchResults?.raffles; track row) {
                    <button type="button" (mousedown)="navigateFromSearch(row.route)">
                      <span>{{ row.title }}</span>
                      <small>{{ row.status }}</small>
                    </button>
                  }
                </div>
              }
              @if (searchResults?.winners?.length) {
                <div class="result-group">
                  <h5>Winners</h5>
                  @for (row of searchResults?.winners; track row) {
                    <button type="button" (mousedown)="navigateFromSearch(row.route)">
                      <span>{{ row.winnerName }}</span>
                      <small>{{ row.productTitle }}</small>
                    </button>
                  }
                </div>
              }
            </section>
          }
        </label>
        <button type="button" class="primary-button" (click)="onNewRaffleClick()">+ New Raffle</button>
      </div>
    </header>

    <section class="page-body">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
